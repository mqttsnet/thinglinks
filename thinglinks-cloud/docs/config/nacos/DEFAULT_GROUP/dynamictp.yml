      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）
      queueTimeout: 30000                            # 任务在队列等待超时阈值，单位（ms），默认0（不统计）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器名称，继承TaskWrapper接口
      notifyEnabled: false                           # 是否开启报警，默认true
      platformIds: [1]                             # 报警平台id，不配置默认拿上层platforms配置的所有平台

    - threadPoolName: ruleDefaultExecutor            # 线程池名称，必填
      threadPoolAliasName: rule默认线程池             # 线程池别名，可选
      executorType: common                           # 线程池类型 common、eager、ordered、scheduled、priority，默认 common
      corePoolSize: 16                               # 核心线程数，默认1
      maximumPoolSize: 64                            # 最大线程数（桥接并发场景大于普通业务，给 64）
      queueCapacity: 10000                           # 队列容量，默认1024
      queueType: VariableLinkedBlockingQueue         # 任务队列，查看源码QueueTypeEnum枚举类，默认VariableLinkedBlockingQueue
      rejectedHandlerType: CallerRunsPolicy          # 拒绝策略：队列满走调用方线程，背压保护
      keepAliveTime: 60                              # 空闲线程等待超时时间，默认60

      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）
      queueTimeout: 30000                            # 任务在队列等待超时阈值，单位（ms），默认0（不统计）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器：ttl 透传 ContextUtil.LocalMap（@DS 切库依赖此项）；mdc 透传日志 traceId
      notifyEnabled: false                           # 是否开启报警，默认true
      platformIds: [1]                               # 报警平台id，不配置默认拿上层platforms配置的所有平台

    - threadPoolName: ruleBridgeLogExecutor          # 线程池名称，必填
      threadPoolAliasName: rule桥接日志入库池          # 线程池别名，可选
      executorType: common                           # 线程池类型 common、eager、ordered、scheduled、priority，默认 common
      corePoolSize: 4                                # 核心线程数（log 写库为 I/O 任务，4 线程足够）
      maximumPoolSize: 8                             # 最大线程数
      queueCapacity: 50000                           # 队列容量大，吸收 dispatch 突发流量
      queueType: VariableLinkedBlockingQueue         # 任务队列
      rejectedHandlerType: DiscardOldestPolicy       # 拒绝策略：队列满丢最老 log（log 不能阻塞主链路；丢日志可接受）
      keepAliveTime: 60                              # 空闲线程等待超时时间，默认60
      threadNamePrefix: rule-bridge-log              # 线程名前缀
      allowCoreThreadTimeOut: false                  # 是否允许核心线程池超时，默认false
      waitForTasksToCompleteOnShutdown: true         # 优雅关闭线程池
      awaitTerminationSeconds: 10                    # 优雅关闭等待 10s（让排队中的 trace 尽量落库）
      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 3000                               # 单条 trace 写库超时阈值，单位（ms）
      queueTimeout: 0                                # 不统计排队超时（log 队列允许深排）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器：必须有 ttl 透传 LocalMap，否则 traceManager.save 切库失败
      notifyEnabled: false                           # 是否开启报警，默认true

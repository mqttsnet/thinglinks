      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）
      queueTimeout: 30000                            # 任务在队列等待超时阈值，单位（ms），默认0（不统计）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器名称，继承TaskWrapper接口
      notifyEnabled: false                           # 是否开启报警，默认true
      platformIds: [1]                             # 报警平台id，不配置默认拿上层platforms配置的所有平台

    - threadPoolName: mqsBusDefaultExecutor          # 线程池名称，必填(mqs-bus 协议总线 POST 阶段默认池)
      threadPoolAliasName: mqs总线默认池               # 线程池别名,所有 POST stage 共用;后续按需加 mqsBus<StageName>Executor 隔离
      executorType: common                           # 线程池类型 common、eager、ordered、scheduled、priority，默认 common
      corePoolSize: 4                                # 核心线程数(POST 阶段任务多但单条短)
      maximumPoolSize: 16                            # 最大线程数
      queueCapacity: 50000                           # 队列容量大,吸收 dispatch 突发流量
      queueType: VariableLinkedBlockingQueue         # 任务队列
      rejectedHandlerType: CallerRunsPolicy          # 拒绝策略：队列满走调用方线程,背压保护
      keepAliveTime: 60                              # 空闲线程等待超时时间，默认60
      threadNamePrefix: mqs-bus                      # 线程名前缀
      allowCoreThreadTimeOut: false                  # 是否允许核心线程池超时，默认false
      waitForTasksToCompleteOnShutdown: true         # 参考spring线程池设计，优雅关闭线程池，默认true
      awaitTerminationSeconds: 5                     # 优雅关闭线程池时，阻塞等待线程池中任务执行时间，默认3，单位（s）
      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）
      queueTimeout: 30000                            # 任务在队列等待超时阈值，单位（ms），默认0（不统计）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器：必须有 ttl 透传 ContextUtil.LocalMap(traceId/tenantId/@DS 切库依赖此项);mdc 透传日志 traceId
      notifyEnabled: false                           # 是否开启报警，默认true
      platformIds: [1]                               # 报警平台id

    - threadPoolName: videoDefaultExecutor           # 线程池名称，必填

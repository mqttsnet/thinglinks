thinglinks:
  rabbitmq:
    ip: 127.0.0.1     # RabbitMQ服务器IP（生产环境建议使用内网地址）
    port: 5672             # AMQP协议端口（切记开放防火墙）
    vhost: '/dev'           # 虚拟主机名称（需与服务端创建的一致）
    username: ${RABBITMQ_USERNAME:}   # 生产环境建议使用非默认账号
    password: ${RABBITMQ_PASSWORD:} # 密码应符合企业安全规范

spring:
  rabbitmq:
    host: ${thinglinks.rabbitmq.ip}
    port: ${thinglinks.rabbitmq.port}
    virtual-host: ${thinglinks.rabbitmq.vhost} # 消息隔离/多租户支持
    username: ${thinglinks.rabbitmq.username}
    password: ${thinglinks.rabbitmq.password}
    ssl:
      enabled: false # 云服务必须启用SSL，内网可关闭提升性能
    connection-timeout: 30000 # 连接超时(ms)，建议与TCP超时时间匹配
    # 消费者配置（消息接收端）
    listener:
      type: direct        # 使用Direct监听容器（比simple模式高效）
      direct:
        prefetch: 50      # 每个消费者最大预取消息数（根据内存调整）
        concurrency: 5    # 初始并发线程数（建议=CPU核心数*2）
        max-concurrency: 10  # 最大并发数（动态伸缩上限）
        acknowledge-mode: manual  # 手动确认！必须代码中调用basicAck
    # 生产者配置（消息发送端）
    template:
      retry:
        enabled: true     # 发送失败自动重试（应对网络抖动）
        initial-interval: 1000ms  # 首次重试间隔（配合退避策略）
        max-attempts: 3   # 包含首次的总尝试次数（建议<=5）

# 网络配置
networks:
  backend:
    driver: bridge

# 作者及社区信息
x-metadata-config: &metadata-config
  maintainer: "mqttsnet@163.com"
  community: "mqttsnet"
  copyright: "Copyright © 2019–present mqttsnet"

# 共享环境配置
x-env-config: &env-config
  TZ: Asia/Shanghai
  # 设置 Spring 运行环境为 test (打包构建时也需要指定)
  SPRING_PROFILES_ACTIVE: test
  # Nacos 服务器 IP
  NACOS_IP: 127.0.0.1
  # Nacos 服务器端口
  NACOS_PORT: 18848
  # Nacos 的命名空间
  NACOS_NAMESPACE: c0858b2e-960e-47b9-9b2d-17294dda787c
  # Nacos 用户名
  NACOS_USERNAME: ${NACOS_USERNAME:?NACOS_USERNAME must be set}
  # Nacos 密码
  NACOS_PASSWORD: ${NACOS_PASSWORD:?NACOS_PASSWORD must be set}
  # 指定服务注册 IP
  NACOS_DISCOVERY_IP: 127.0.0.1
  # JVM 内存参数配置（适配Dockerfile中的配置）
  # 初始堆内存大小
  JVM_XMS: 512m
  # 最大堆内存大小
  JVM_XMX: 1024M
  # 最大元空间大小
  JVM_MAX_METASPACE: 1024M
  # 保留代码缓存大小
  JVM_RESERVED_CODE_CACHE: 512m
  # 初始代码缓存大小
  JVM_INITIAL_CODE_CACHE: 128m
  # 健康检查用户名
  ACTUATOR_USERNAME: ${ACTUATOR_USERNAME:?ACTUATOR_USERNAME must be set}
  # 健康检查密码
  ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD:?ACTUATOR_PASSWORD must be set}

# 共享卷和网络配置
x-shared-config: &shared-config
  environment:
    - TZ=Asia/Shanghai
  volumes:
    - /data01/mqttsnet/thinglinks:/data01/mqttsnet/thinglinks
    - /etc/localtime:/etc/localtime
  restart: always
  networks:
    - backend
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "50"

# 服务定义
services:
  thinglinks-base:
    container_name: thinglinks-base-server
    build:
      context: ../thinglinks-base/thinglinks-base-server
      dockerfile: Dockerfile
    ports:
      - "18764:18764" # 映射端口
    environment:
      <<: *env-config
      SERVICE_PORT: 18764
    healthcheck:
      test: [ "CMD", "sh", "-c", "curl -f -u ${ACTUATOR_USERNAME}:${ACTUATOR_PASSWORD} http://localhost:${SERVICE_PORT}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    <<: *shared-config  # 只引用 shared-config，因为 metadata-config 不应用于服务定义
  thinglinks-broker:
    container_name: thinglinks-broker-server
    build:
      context: ../thinglinks-broker/thinglinks-broker-server

thinglinks:
  swagger:
    version: '@project.version@'
  nacos:
    ip: ${NACOS_IP:@nacos.ip@}
    port: ${NACOS_PORT:@nacos.port@}
    namespace: ${NACOS_NAMESPACE:@nacos.namespace@}
    username: ${NACOS_USERNAME:@nacos.username@}
    password: ${NACOS_PASSWORD:@nacos.password@}
    group: DEFAULT_GROUP
    discovery:
      ip: ${NACOS_DISCOVERY_IP:@nacos.discovery.ip@}
  sentinel:
    dashboard: ${SENTINEL_DASHBOARD:@sentinel.dashboard@}
  seata:
    ip: ${SEATA_IP:@seata.ip@}
    port: ${SEATA_PORT:@seata.port@}
    namespace: ${SEATA_NAMESPACE:@seata.namespace@}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: '@project.artifactId@'
    # 此参数一定要和 thinglinks-gateway-server.yml 文件中配置的 路由前缀(predicates参数) 一致！ （可以参考 system或base 服务）
    path: /iot-executor
  profiles:
    active: @profile.active@
  config:
    import:
      - nacos:common.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:redis.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:database.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:kafka.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:rabbitmq.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:rocketmq.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:dynamictp.yml?group=${thinglinks.nacos.group}&refresh=true
      - nacos:thinglinks-base-server.yml?refresh=true
      - nacos:thinglinks-rule-server.yml?refresh=true
      - nacos:thinglinks-link-server.yml?refresh=true
      - nacos:${spring.application.name}.yml?refresh=true
  cloud:
    sentinel:
      enabled: true
      filter:
        enabled: true
      eager: true  # 取消Sentinel控制台懒加载
      transport:
        dashboard: ${thinglinks.sentinel.dashboard}
    nacos:
      server-addr: ${thinglinks.nacos.ip}:${thinglinks.nacos.port}
      username: ${thinglinks.nacos.username}
      password: ${thinglinks.nacos.password}
      config:
        file-extension: yml
        namespace: ${thinglinks.nacos.namespace}
        enabled: true
      discovery:
        server-addr: ${thinglinks.nacos.ip}:${thinglinks.nacos.port}
        namespace: ${thinglinks.nacos.namespace}
        ip: ${thinglinks.nacos.discovery.ip}
        metadata: # 元数据，用于权限服务实时获取各个服务的所有接口
          management.context-path: ${server.servlet.context-path:}${spring.mvc.servlet.path:}${management.endpoints.web.base-path:}
          gray_version: mqttsnet


# 用于/actuator/info
info:
  name: '@project.name@'
  description: '@project.description@'
  version: '@project.version@'

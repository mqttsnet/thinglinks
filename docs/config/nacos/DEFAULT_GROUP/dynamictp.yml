#线程池配置
dynamictp:
  enabled: true                               # 是否启用 dynamictp，默认true
  enabledCollect: true                        # 是否开启监控指标采集，默认true
  collectorTypes: micrometer          # 监控数据采集器类型（logging | micrometer | internal_logging | JMX），默认micrometer
  #logPath: /Users/mqttsnet/Documents/data/logs/dynamictp/user-center/  # 监控日志数据路径，默认 ${user.home}/logs，采集类型非logging不用配置
  monitorInterval: 30                          # 监控时间间隔（报警检测、指标采集），默认5s
  
  # 告警渠道
  platforms:                                  # 通知报警平台配置
    - platform: ding
      platformId: 1                            # 平台id，自定义
      urlKey: your-dingtalk-webhook-token     # webhook 中的 access_token
      secret: your-dingtalk-secret           # 安全设置在验签模式下才的秘钥，非验签模式没有此值
      receivers: 13733918655                   # 钉钉账号手机号
  
  # 全局配置    
  globalExecutorProps:                        # 线程池配置 > 全局配置 > 字段默认值
    rejectedHandlerType: CallerRunsPolicy
    queueType: VariableLinkedBlockingQueue
    waitForTasksToCompleteOnShutdown: true
    awaitTerminationSeconds: 5
    taskWrapperNames: ["swTrace", "ttl", "mdc"]
    queueTimeout: 500
    runTimeout: 5000
    notifyItems:                     # 报警项，不配置自动会按默认值配置（变更通知、容量报警、活性报警、拒绝报警、任务超时报警）
      - type: change                 # 线程池核心参数变更通知
        silencePeriod: 120           # 通知静默时间（单位：s），默认值1，0表示不静默

      - type: capacity               # 队列容量使用率，报警项类型，查看源码 NotifyTypeEnum枚举类
        threshold: 80                # 报警阈值，意思是队列使用率达到70%告警；默认值=70
        count: 5                     # 在一个统计周期内，如果触发阈值的数量达到 count，则触发报警；默认值=1
        period: 60                   # 报警统计周期（单位：s），默认值=120
        silencePeriod: 60             # 报警静默时间（单位：s），0表示不静默，默认值=120

      - type: liveness               # 线程池活性
        threshold: 80                # 报警阈值，意思是活性达到70%告警；默认值=70
        count: 5                     # 在一个统计周期内，如果触发阈值的数量达到 count，则触发报警；默认值=1
        period: 60                   # 报警统计周期（单位：s），默认值=120
        silencePeriod: 60             # 报警静默时间（单位：s），0表示不静默；默认值=120

      - type: reject                 # 触发任务拒绝告警
        count: 5                     # 在一个统计周期内，如果触发拒绝策略次数达到 count，则触发报警；默认值=1
        period: 60                   # 报警统计周期（单位：s），默认值=120
        silencePeriod: 60             # 报警静默时间（单位：s），0表示不静默；默认值=120

      - type: run_timeout            # 任务执行超时告警
        count: 20                    # 在一个统计周期内，如果执行超时次数达到 count，则触发报警；默认值=10
        period: 60                   # 报警统计周期（单位：s），默认值=120
        silencePeriod: 60            # 报警静默时间（单位：s），0表示不静默；默认值=120

      - type: queue_timeout          # 任务排队超时告警
        count: 20                     # 在一个统计周期内，如果排队超时次数达到 count，则触发报警；默认值=10
        period: 60                   # 报警统计周期（单位：s），默认值=120
        silencePeriod: 60             # 报警静默时间（单位：s），0表示不静默；默认值=120
  
  # 线程池配置      
  executors:                               # 动态线程池配置，都有默认值，采用默认值的可以不配置该项，减少配置量
      # 系统默认线程池
    - threadPoolName: systemDefaultExecutor          # 线程池名称，必填
      threadPoolAliasName: 系统默认线程池              # 线程池别名，可选
      executorType: common                           # 线程池类型 common、eager、ordered、scheduled、priority，默认 common
      corePoolSize: 16                               # 核心线程数，默认1
      maximumPoolSize: 32                            # 最大线程数，默认cpu核数
      queueCapacity: 5000                            # 队列容量，默认1024
      queueType: VariableLinkedBlockingQueue         # 任务队列，查看源码QueueTypeEnum枚举类，默认VariableLinkedBlockingQueue
      rejectedHandlerType: CallerRunsPolicy          # 拒绝策略，查看RejectedTypeEnum枚举类，默认AbortPolicy
      keepAliveTime: 60                              # 空闲线程等待超时时间，默认60
      threadNamePrefix: system-default               # 线程名前缀，默认dtp
      allowCoreThreadTimeOut: false                  # 是否允许核心线程池超时，默认false
      waitForTasksToCompleteOnShutdown: true         # 参考spring线程池设计，优雅关闭线程池，默认true
      awaitTerminationSeconds: 10                    # 优雅关闭线程池时，阻塞等待线程池中任务执行时间，默认3，单位（s）
      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）
      queueTimeout: 30000                            # 任务在队列等待超时阈值，单位（ms），默认0（不统计）
      tryInterrupt: false                            # 执行超时后是否中断线程，默认false
      taskWrapperNames: ["ttl", "mdc"]               # 任务包装器名称，继承TaskWrapper接口
      notifyEnabled: false                           # 是否开启报警，默认true
      platformIds: [1]                               # 报警平台id，不配置默认拿上层platforms配置的所有平台

    - threadPoolName: linkDefaultExecutor            # 线程池名称，必填
      threadPoolAliasName: link默认线程池              # 线程池别名，可选
      executorType: common                           # 线程池类型 common、eager、ordered、scheduled、priority，默认 common
      corePoolSize: 16                               # 核心线程数，默认1
      maximumPoolSize: 32                            # 最大线程数，默认cpu核数
      queueCapacity: 10000                           # 队列容量，默认1024
      queueType: VariableLinkedBlockingQueue         # 任务队列，查看源码QueueTypeEnum枚举类，默认VariableLinkedBlockingQueue
      rejectedHandlerType: CallerRunsPolicy          # 拒绝策略，查看RejectedTypeEnum枚举类，默认AbortPolicy
      keepAliveTime: 60                              # 空闲线程等待超时时间，默认60
      threadNamePrefix: test                         # 线程名前缀，默认dtp
      allowCoreThreadTimeOut: false                  # 是否允许核心线程池超时，默认false
      waitForTasksToCompleteOnShutdown: true         # 参考spring线程池设计，优雅关闭线程池，默认true
      awaitTerminationSeconds: 5                     # 优雅关闭线程池时，阻塞等待线程池中任务执行时间，默认3，单位（s）
      preStartAllCoreThreads: false                  # 是否预热所有核心线程，默认false
      runTimeout: 5000                               # 任务执行超时阈值，单位（ms），默认0（不统计）

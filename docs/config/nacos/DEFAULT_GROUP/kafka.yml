spring:
  kafka:
    # ==================== 通用配置 ====================
    # Kafka服务器地址列表（如果开启了SASL,必须使用SASL端口）
    bootstrap-servers: 127.0.0.1:19092,127.0.0.1:29092,127.0.0.1:39092

    # ==================== # SASL认证配置（通用）（如未开启SASL认证，可不配置,将下列SASL配置项注释掉即可） ====================
    #properties:
      # 【核心】SASL认证配置
      # 安全协议：SASL_PLAINTEXT 或 SASL_SSL
      #security.protocol: SASL_PLAINTEXT
      # SASL机制：PLAIN/SCRAM-SHA-256/SCRAM-SHA-512
      #sasl.mechanism: PLAIN
      #【重要】不同mechanism 使用的 org.apache.kafka.common.security 不同，请根据实际情况配置，JAAS配置必须以分号结尾
      #sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="your-kafka-user" password="your-kafka-password";
    
    # ==================== 生产者配置 ====================
    producer:
      # 开启事务，必须在开启了事务的方法中发送，否则报错
      transaction-id-prefix: kafkaTx-
      # 发生错误后，消息重发的次数。可以设置为Integer.MAX_VALUE以进行无限次重试。开启事务必须设置大于0。
      retries: 5
      # acks=0 ：生产者在成功写入消息之前不会等待任何来自服务器的响应。
      # acks=1 ：只要集群的首领节点收到消息，生产者就会收到一个来自服务器的成功响应。
      # acks=all ：只有当所有参与复制的节点全部收到消息时，生产者才会收到一个来自服务器的成功响应。
      # 开启事务时，必须设置为all。
      acks: all
      # 当有多个消息需要被发送到同一个分区时，生产者会把它们放在同一个批次里。该参数指定了一个批次可以使用的内存大小，按照字节数计算。
      batch-size: 16384
      # 生产者内存缓冲区的大小。
      buffer-memory: 33554432  # 32MB，增加以支持更大的消息批次
      # 消息延迟发送的时间，等待更多消息批次，优化吞吐量
      linger-ms: 50
      # 生产者尝试发送消息的最大时间，超过此时间未成功则放弃
      delivery-timeout-ms: 120000  # 2分钟超时
      # 序列化配置
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    
    # ==================== 消费者配置 ====================
    consumer:
      group-id: thingLinksPro
      # 该属性指定了消费者在读取一个没有偏移量的分区或者偏移量无效的情况下该作何处理：
      # earliest：当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，从头开始消费分区的记录。
      # latest：当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，消费新产生的该分区下的数据（在消费者启动之后生成的记录）。
      # none：当各分区都存在已提交的offset时，从提交的offset开始消费；只要有一个分区不存在已提交的offset，则抛出异常。
      auto-offset-reset: earliest
      # 是否自动提交偏移量，默认值是true。为了避免出现重复数据和数据丢失，可以把它设置为false，然后手动提交偏移量。
      enable-auto-commit: false
      # 自动提交的时间间隔
      auto-commit-interval: 2s
      # 这个参数定义了poll方法最多可以拉取多少条消息，默认值为500。
      max-poll-records: 1000
      # 两次poll之间的最大间隔，默认值为5分钟。如果超过这个间隔会触发rebalance。
      max-poll-interval-ms: 600000  # 10分钟
      # 当broker多久没有收到consumer的心跳请求后就触发rebalance，默认值是10秒。
      session-timeout-ms: 15000  # 15秒，增加稳定性，减少频繁的rebalance
      # 心跳间隔，确保消费者定期发送心跳以避免频繁的rebalance
      heartbeat-interval-ms: 3000  # 3秒
      properties:
      # 配置消费者的 Json 反序列化的可信赖包，反序列化实体类需要
        spring:
          json:
            trusted:
              packages: "*"
      # 序列化配置
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    
    # ==================== 监听器配置 ====================
    listener:
      # 监听器类型：single-单条处理，batch-批量处理
      type: batch
      # 在侦听器容器中运行的线程数，一般设置为机器数*分区数
      concurrency: 4
      # 自动提交关闭，需要设置手动消息确认
      ack-mode: manual_immediate
      # 消费监听接口监听的主题不存在时，默认会报错，所以设置为false忽略错误。
      missing-topics-fatal: false
      # 两次poll之间的最大间隔，默认值为5分钟。如果超过这个间隔会触发rebalance。
      poll-timeout: 600s  # 10分钟（使用Duration格式）
    
    # ==================== 模板配置 ====================
    template:
      # 默认主题（可选）
      default-topic: thinglinks-default-topic
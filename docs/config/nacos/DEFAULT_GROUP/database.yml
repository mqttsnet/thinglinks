thinglinks:
  # validation-query 参数对不同数据库的支持参考：https://www.cnblogs.com/BonnieWss/p/9100402.html
  druid-mysql: &druid-mysql
    validation-query: SELECT 'x'
  druid-dameng: &druid-dameng
    validation-query: SELECT 'x'
  druid-taosdata: &druid-taosdata
    validation-query: SELECT 1
  mysql: &db-mysql
    username: 'root'
    password: 'your-mysql-password'
    driverClassName: com.mysql.cj.jdbc.Driver
    # 主主复制集群的连接 URL，使用服务器IP和端口
    # 以下是样例中的默认端口号和数据库名称，请根据实际情况修改
    # connectTimeout/socketTimeout 防止网络异常时连接长时间阻塞
    url: jdbc:mysql://127.0.0.1:13306/thinglinks_ds_c_defaults?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&useSSL=false&connectTimeout=3000&socketTimeout=60000&zeroDateTimeBehavior=CONVERT_TO_NULL&allowMultiQueries=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
  # dameng: &db-dameng
  #   username: 'SYSDBA'
  #   password: 'SYSDBA001'
  #   driverClassName: dm.jdbc.driver.DmDriver
  #   # 主主复制集群的连接 URL，使用服务器IP和端口
  #   #以下是样例中的默认端口号和数据库名称，请根据实际情况修改
  #   url: jdbc:dm://127.0.0.1:30236/thinglinks_ds_c_defaults
  taosdata: &db-taosdata
    #Tdengine官方JDBC驱动文档：https://docs.taosdata.com/reference/connector/java/#jdbc-%E9%A9%B1%E5%8A%A8
    username: 'root'
    password: 'taosdata'
    #Tdengine Cloud 模式 需要此Token （非Cloud环境可直接忽略）
    #token: '3c4b8632d824467855c45868f7ee0ecd27389b5'
    #url: jdbc:TAOS-RS://gw.cloud.taosdata.com/xiaonan?useSSL=true&token=${thinglinks.taosdata.token}
    #Tdengine JDBC REST 模式
    driverClassName: com.taosdata.jdbc.rs.RestfulDriver
    url: jdbc:TAOS-RS://127.0.0.1:6041/thinglinks_ds_c_defaults?user=${thinglinks.taosdata.username}&password=${thinglinks.taosdata.password}
    #Tdengine JDBC WebSocket 模式 (推荐)
    #driverClassName: com.taosdata.jdbc.ws.WebSocketDriver
    #url: jdbc:TAOS-WS://127.0.0.1:6041/thinglinks_ds_c_defaults?user=${thinglinks.taosdata.username}&password=${thinglinks.taosdata.password}&varcharAsString=true&batchErrorIgnore=false&httpConnectTimeout=15000&messageWaitTimeout=30000&useSSL=false&connmode=0
  database: # 字段介绍参考 DatabaseProperties
    # COLUMN模式中隔离 租户 的列名  oracle数据库initDatabasePrefix不能超过11个字符
    initDatabasePrefix:
      - thinglinks_base
      - thinglinks_extend
    tenantIdColumn: 'created_org_id'
    multiTenantType: DATASOURCE_COLUMN
    # 是否启用数据权限
    isDataScope: true
    # 拦截无 WHERE 条件的全表 UPDATE / DELETE(仅作用于 MyBatis 映射 SQL,租户初始化脚本走原生 JDBC 不受影响)
    isBlockAttack: true
    # 是否启用 sql 性能规范插件
    isIllegalSql: false
    # 是否启用分布式事务
    isSeata: false
    # 开发环境开启 p6spy 便于 SQL 排查;生产环境请设置 p6spy = false,避免全量 SQL 日志带来的 IO 与延迟开销
    p6spy: true
    # 单页分页条数上限,超出按上限静默截断;仅作用于带 IPage 参数的查询,list()/selectList() 全量查询不受影响。
    # 新增更大单页需求时同步调整;如需完全不限制设为 -1
    maxLimit: -1
    # 溢出总页数后是否进行处理
    overflow: true
    # 生成 countSql 优化掉 join, 现在只支持 left join
    optimizeJoin: true
    # id生成策略
    id-type: CACHE
    # 扩展SQL 参数
    extendSqlParameters:
      #TDengine 创建库选项（database_options 性能参数配置等）
      tdengineCreateDatabaseOptions: vgroups 10 buffer 10 precision 'ns'
    hutoolId:
      workerId: 0
      dataCenterId: 0
    cache-id:
      time-bits: 31
      worker-bits: 22
      seq-bits: 10
      epochStr: '2020-09-15'
      boost-power: 3
      padding-factor: 50

# mysql 通用配置
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  datasource:
    dynamic:
      enabled: true
      # 严格模式:目标数据源不存在时直接报错,禁止回落到 primary,保障多租户数据隔离
      strict: true
      # 从这里开始(dynamic)，中间的这段配置用于 thinglinks.database.multiTenantType == DATASOURCE 时
      p6spy: ${thinglinks.database.p6spy:false}
      seata: ${thinglinks.database.isSeata:false}
      primary: "0"
      datasource:
        "0":
#          <<: *db-dameng
          <<: *db-mysql
        "1":
          <<: *db-taosdata
      druid:
        # 连接有效性校验语句,MySQL 与 TDengine 通用
        validation-query: SELECT 1
        # 池初始化时建立的物理连接数
        initialSize: 10
        # 池内保持的最小空闲连接数
        minIdle: 10
        # 单池最大活跃连接数,全局连接预算 = 各服务各池 maxActive 之和,需控制在 MySQL max_connections 以内
        maxActive: 200
        # 获取连接的最大等待时间(毫秒),池满时快速失败,避免请求线程长时间阻塞堆积
        max-wait: 5000
        # 对 minIdle 内的空闲连接定期探活,防止被数据库 wait_timeout 关闭后业务拿到失效连接
        keepAlive: true
        # 仅在空闲检测时校验连接,借出/归还不校验,降低高并发下的校验开销
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        # 空闲连接检测周期(毫秒)
        time-between-eviction-runs-millis: 60000
        # 连接在池中的最小空闲存活时间(毫秒),低于该时长不回收
        min-evictable-idle-time-millis: 300000
        # 连接在池中的最大空闲存活时间(毫秒),超时强制物理回收,避免长期持有陈旧连接
        max-evictable-idle-time-millis: 900000
        # MySQL 场景关闭 PSCache(预编译语句缓存),无性能收益且占用 JVM 内存
        pool-prepared-statements: false
        max-pool-prepared-statement-per-connection-size: -1
        # 连接借出超时强制回收机制:防止业务侧借出连接未归还导致连接泄漏
        # 注意:超时时间须大于业务最长单次借用时长,跑批类服务请按需调大
        removeAbandoned: true
        removeAbandonedTimeoutMillis: 180000
        # 回收时打印借出方堆栈,用于定位泄漏代码
        logAbandoned: true
        filters: stat,wall
        stat:
          # 慢 SQL 记录,慢 SQL 长时间占用连接是连接池耗尽的主要诱因
          log-slow-sql: true
          slow-sql-millis: 1000
          # 参数化合并同构 SQL,避免统计页被相同模板的 SQL 刷爆
          merge-sql: true
        wall:
          enabled: true
          # 关闭严格语法检查,兼容 TDengine 方言
          strictSyntaxCheck: false
          comment-allow: true
          # 允许多语句执行,租户初始化建库建表依赖此能力
          multiStatementAllow: true
          noneBaseStatementAllow: true

    # 从这里结束(dynamic)，中间的这段配置用于 thinglinks.database.multiTenantType == DATASOURCE 时
    druid:
      enable: true
      # 以下的2段配置，同时适用于所有模式
      web-stat-filter:  # WebStatFilter配置，说明请参考Druid Wiki，配置_配置WebStatFilter
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
        session-stat-max-count: 1000
        # URI 级 SQL 关联统计:开发环境开启便于排查,生产环境建议关闭(高访问量下开销较大)
        profile-enable: true
        session-stat-enable: false
      stat-view-servlet:  #展示Druid的统计信息,StatViewServlet的用途包括：1.提供监控信息展示的html页面2.提供监控信息的JSON API
        enabled: true
        url-pattern: /druid/*   #根据配置中的url-pattern来访问内置监控页面，如果是上面的配置，内置监控页面的首页是/druid/index.html例如：http://127.0.0.1:9000/druid/index.html
        # 禁止通过页面清空统计数据
        reset-enable: false
        # 监控页访问凭证与 IP 白名单:开发环境暂留空(空 = 无需登录、放行所有来源);生产环境必须设置强口令并收紧 allow 为内网段
        login-username: ''
        login-password: ''
        allow: ''

mybatis-plus:
  mapper-locations:
    - classpath*:mapper_**/**/*Mapper.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.mqttsnet.thinglinks.*.entity;com.mqttsnet.basic.database.mybatis.typehandler
  typeEnumsPackage: com.mqttsnet.thinglinks.*.enumeration
  global-config:
    db-config:
      id-type: INPUT
      insert-strategy: NOT_NULL
      update-strategy: NOT_NULL
      where-strategy: NOT_EMPTY
  configuration:
    #配置返回数据库(column下划线命名&&返回java实体是驼峰命名)，自动匹配无需as（没开启这个，SQL需要写as： select user_id as userId）
    map-underscore-to-camel-case: true
    cache-enabled: false
    #配置JdbcTypeForNull, oracle数据库必须配置
    jdbc-type-for-null: 'null'
    default-enum-type-handler: com.mqttsnet.basic.database.mybatis.handlers.MybatisEnumTypeHandler

# 分布式事务相关
seata:
  enabled: ${thinglinks.database.isSeata}
  enableAutoDataSourceProxy: ${thinglinks.database.isSeata}
  tx-service-group: thinglinks_cloud_seata_tx_group
  registry:
    type: nacos
    nacos:
      server-addr: ${thinglinks.nacos.ip}:${thinglinks.nacos.port}
      username: ${thinglinks.nacos.username}
      password: ${thinglinks.nacos.password}
      namespace: ${thinglinks.seata.namespace}
      group: 'SEATA_GROUP'
  config:
    type: nacos
    nacos:
      server-addr: ${thinglinks.nacos.ip}:${thinglinks.nacos.port}
      username: ${thinglinks.nacos.username}
      password: ${thinglinks.nacos.password}
      namespace: ${thinglinks.seata.namespace}
      dataId: seataServer.properties
      group: 'SEATA_GROUP'
  service:
    grouplist:
      default: ${thinglinks.seata.ip:}:${thinglinks.seata.port:}
    vgroup-mapping:
      thinglinks_cloud_seata_tx_group: default
    disable-global-transaction: false
  client:
    rm:
      report-success-enable: false

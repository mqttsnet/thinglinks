thinglinks:
  #feign 通用三方API服务
  feign: 
    #分布式调度平台
    job:
      accessToken: 'your-access-token'
      # thinglinks-job-admin服务API
      job-server: http://127.0.0.1:18767
    #bifromq MQTT Broker服务API
    bifromq: 
      #api-service的HTTP端口
      bifromq-api-server: http://127.0.0.1:18091

  #openai API
  openai:
    apiKey: ["your-openai-api-key"]
    apiHost: https://api.openai.com/

  # 系统级安全密钥和初始化向量（IV）
  security:
    algorithms:
      aes:
        # 16字节Hex
        key: "your-aes-key-hex"
        iv: "your-aes-iv-hex-"
        mode: "CBC"
      sm4:
        # 16字节Hex
        key: "your-sm4-key-hex"
        iv: "your-sm4-iv-hex-"
        mode: "CBC"

  scan:
    enabled: true
    basePackage: com.mqttsnet
  webmvc:
    undertow: true
    header: true
  ignore:
    # 是否启用网关的 uri权限鉴权 (设置为false，则后台不校验访问权限)
    authEnabled: true
    # 前端校验按钮 是否区分大小写
    caseSensitive: false
    # 系统没有配置某个URI时，是否允许访问
    notConfigUriAllow: true
    anyone:       # 请求中 需要携带Tenant 且 需要携带Token(需要登录)，但不需要验证uri权限
      ALL:
        - /*/anyone/**
        - /anyone/**
    anyUser:      # 请求中 需要携带Tenant，但 不需要携带Token(不需要登录) 和 不需要验证uri权限
      ALL:
        - /*/anyUser/**
        - /anyUser/**
    anyTenant:    # 请求中 不需要携带Tenant 且 不需要携带Token(不需要登录) 和 不需要验证uri权限
      ALL:
        - /*/anyTenant/**
        - /anyTenant/**
        - /magic/web/**
  system: # 详情看: SystemProperties
    # 登录时否验证密码有效性 （常用于开发环境快速登录）
    verifyPassword: true
    # 登录时否验证验证码有效性 （常用于开发环境快速登录）
    verifyCaptcha: true
    # 默认用户密码
    defPwd: '123456'
    # 密码最大输错次数  小于0不限制
    maxPasswordErrorNum: 10
    # 密码错误锁定用户时间  除了0表示锁定到今天结束，还支持m、h、d、w、M、y等单位
    passwordErrorLockUserTime: '0'
    # log记录 com.thinglinks.cloud.controller/service/biz包下 参数
    recordLamp: false
    # log记录 com.thinglinks.cloud.controller/service/biz包下 所有方法的参数
    recordLampArgs: true
    # log记录 com.thinglinscanks.cloud.controller/service/biz包下 所有方法的返回值
    recordLampResult: true
    # 缓存Key前缀
    cachePrefix: lc
    # oauth 服务扫描枚举类的包路径
    enumPackage: "com.mqttsnet"
    # 演示环境启用
    notAllowWrite: false
    notAllowWriteList:
      POST:
        - /defResource
        - /defTenantApplicationRel/cancel
      PUT:
        - /defResource
        - /defResource/moveResource
      DELETE:
        - /defResource*/**
        - /defTenant*/**
        - /defApplication*/**
        - /defUser*/**
        - /defParameter*/**
        - /defDict*/**
        - /defClient*/**

  # swagger 文档通用配置， 主要配置了全局参数、版本号信息、联系人信息  详情看: SwaggerProperties
  swagger:  # 详情看: SwaggerProperties
    license: Powered By mqttsnet
    licenseUrl: https://github.com/mqttsnet
    termsOfServiceUrl: https://github.com/mqttsnet
    contact:  # 联系人信息
      url: https://github.com/mqttsnet
      name: mqttsnet
      email: mqttsnet@163.com
    global-operation-parameters:  # 全局参数
      - name: Token
        description: 用户信息
        modelRef: String
        parameterType: header
        required: true
        # 默认值只是方便本地开发时，少填参数，生产环境请禁用swagger或者禁用默认参数
        defaultValue: "xxx"
      - name: Authorization
        description: 客户端信息
        modelRef: String
        parameterType: header
        required: true
        defaultValue: "dGhpbmdMaW5rc19wcm86dGhpbmdMaW5rc19wcm9fc2VjcmV0"
      - name: TenantId
        description: 租户ID
        modelRef: String
        parameterType: header
        required: true
        defaultValue: "1"
      - name: ApplicationId
        description: 应用ID
        modelRef: String
        parameterType: header
        required: true
        defaultValue: "1"
      - name: Path
        description: 访问的页面路径
        modelRef: String
        parameterType: header
        required: true
        defaultValue: ""
      - name: Locale
        description: 语言环境
        modelRef: String
        parameterType: header
        required: true
        defaultValue: "zh_CN"
  echo:  #详情看: EchoProperties
    # 是否启用 远程数据 手动注入
    enabled: true
    # 是否启用 远程数据 注解AOP注入
    aop-enabled: true
    basePackages:
      - com.mqttsnet.basic
      - com.mqttsnet.thinglinks
    # 字典类型 和 code 的分隔符
    dictSeparator: '###'
    # 多个字典code 之间的的分隔符
    dictItemSeparator: ','
    # 递归最大深度
    maxDepth: 3
    # 本地缓存配置信息 生产慎用
    guavaCache:
      enabled: false
      maximumSize: 1000
      refreshWriteTime: 2
      refreshThreadPoolSize: 10
  log:  # 详情看：OptLogProperties
    # 开启记录操作日志
    enabled: true
    # 记录到什么地方  DB:mysql LOGGER:日志文件
    type: DB
  xss:
    # 是否开启 xss 过滤器  详情看：XssProperties
    enabled: true
    # 是否启用 RequestBody 注解标记的参数 反序列化时过滤XSS
    requestBodyEnabled: false
    ignoreParamValues:
      - noxss
  captcha:
    # 登录界面的验证码配置 详情看：CaptchaProperties
    type: ARITHMETIC
    width: 158
    height: 58
    len: 2
    charType: 2
  async:  # 全局线程池配置
    corePoolSize: 2
    maxPoolSize: 50
    queueCapacity: 10000
    keepAliveSeconds: 300
    threadNamePrefix: 'thinglinks-async-executor-'

# knife4j 文档通用配置 详情看: Knife4jProperties
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
    #     是否在每个Debug调试栏后显示刷新变量按钮,默认不显示
    enableReloadCacheParameter: true
    #    是否开启界面中对某接口的版本控制,如果开启，后端变化后Ui界面会存在小蓝点
    enableVersion: true
    #    针对RequestMapping的接口请求类型,在不指定参数类型的情况下,如果不过滤,默认会显示7个类型的接口地址参数,如果开启此配置,默认展示一个Post类型的接口地址
    enableFilterMultipartApis: false
    #    是否开启动态参数调试功能
    enableDynamicParameter: true
    #    是否显示Footer
    enableFooter: false
    enableFooterCustom: true
    footerCustomContent: Apache License 2.0 | Copyright  2026 [thinglinks](https://github.com/mqttsnet)
springdoc:
  # 默认是false，需要设置为true
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: ${knife4j.enable}
    path: /v3/api-docs

server:
  # 优雅停机
  shutdown: GRACEFUL
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  mvc:
    pathmatch:
      # 升级springboot2.6.6后临时处理，防止swagger报错
      matching-strategy: ANT_PATH_MATCHER
  lifecycle:
    # 优雅停机宽限期时间
    timeout-per-shutdown-phase: 30s
  servlet:
    # 上传文件最大值
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  cloud:      
    openfeign:
      okhttp:
        enabled: true
      httpclient:
        enabled: false
        time-to-live: 15
        time-to-live-unit: seconds
        connection-timeout: 30000
        connection-timer-repeat: 3000
        max-connections: 500
        max-connections-per-route: 50
        hc5:
          connection-request-timeout: 15
          connection-request-timeout-unit: seconds
          socket-timeout: 15
          socket-timeout-unit: seconds
          pool-concurrency-policy: lax
          pool-reuse-policy: lifo
      compression:
        request:
          enabled: true
        response:
          enabled: true
        
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: '*'
  endpoint:
    shutdown:
      access: unrestricted
    health:
      show-details: ALWAYS

# actuator 安全配置
actuator:
  security:
    username: actuator-admin
    password: your-actuator-password
    roles: ACTUATOR_ADMIN

# Sa-Token配置
sa-token:
  # token前缀
  token-prefix: 
  # token名称 (同时也是cookie名称)
  token-name: Token
  # token有效期，单位s 默认30天, -1代表永不过期
  # timeout: 300
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: false



logging:
  file:
    path: ./logs
    name: ${logging.file.path}/${spring.application.name}/root.log
  level:
    root: INFO
    # 关闭不必要的日志
    org.reflections.Reflections: off
    com.alibaba.nacos.client: error
    com.alibaba.nacos.common.remote.client: error
    com.ulisesbocchio: error
    # 开发、调试需要的日志
    com.mqttsnet: info
    org.springframework: info
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
    console: "[${spring.application.name}:%X{TenantId}:%X{UserId}] %d{yyyy-MM-dd HH:mm:ss.SSS}[%5p] ${PID} [%X{trace}] [%t:%r] [%logger{50}.%M:%L] %m%n"
  logback:
    rollingpolicy:
      max-file-size: 64MB
